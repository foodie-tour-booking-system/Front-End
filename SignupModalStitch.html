<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Customer Sign Up Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "primary-hover": "#dcb022",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2c281a",
                        "text-main": "#1c180d",
                        "text-muted": "#9c8749",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #e8e2ce;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop / Container -->
<div class="w-full max-w-[520px] bg-surface-light dark:bg-surface-dark rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-[#e8e2ce] dark:border-[#4a4533] overflow-hidden relative">
<!-- Close Button (Absolute) -->
<button class="absolute top-4 right-4 text-text-muted hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<div class="p-8 md:p-10 flex flex-col gap-6">
<!-- Header Section -->
<div class="flex flex-col gap-2 text-center">
<h1 class="text-text-main dark:text-white text-3xl font-bold tracking-tight">Create Account</h1>
<p class="text-text-muted dark:text-[#d4c59a] text-sm">Join us for exclusive river experiences.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-5">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-gray-200 text-sm font-medium" for="fullName">Full Name</label>
<div class="relative group">
<input class="form-input w-full rounded-lg border border-[#e8e2ce] dark:border-[#4a4533] bg-background-light dark:bg-background-dark text-text-main dark:text-white h-12 px-4 placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="fullName" placeholder="e.g. John Doe" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none text-[20px]">person</span>
</div>
</div>
<!-- Contact Info Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-gray-200 text-sm font-medium" for="email">Email Address</label>
<div class="relative group">
<input class="form-input w-full rounded-lg border border-[#e8e2ce] dark:border-[#4a4533] bg-background-light dark:bg-background-dark text-text-main dark:text-white h-12 px-4 placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="email" placeholder="john@example.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none text-[20px]">mail</span>
</div>
</div>
<!-- Phone -->
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-gray-200 text-sm font-medium" for="phone">Phone Number</label>
<div class="relative group">
<input class="form-input w-full rounded-lg border border-[#e8e2ce] dark:border-[#4a4533] bg-background-light dark:bg-background-dark text-text-main dark:text-white h-12 px-4 placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none text-[20px]">call</span>
</div>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-gray-200 text-sm font-medium" for="password">Create Password</label>
<div class="relative group">
<input class="form-input w-full rounded-lg border border-[#e8e2ce] dark:border-[#4a4533] bg-background-light dark:bg-background-dark text-text-main dark:text-white h-12 px-4 pr-12 placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="password" placeholder="Enter a secure password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-text-muted hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 mt-1">
<div class="relative flex items-center h-5">
<input class="h-5 w-5 rounded border-[#e8e2ce] dark:border-[#4a4533] bg-transparent text-primary checked:bg-primary focus:ring-offset-0 focus:ring-0 focus:border-primary cursor-pointer transition-colors" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-text-main dark:text-gray-300 leading-tight select-none cursor-pointer" for="terms">
                        I agree to the <a class="text-primary hover:text-primary-hover hover:underline" href="#">Terms &amp; Conditions</a> and <a class="text-primary hover:text-primary-hover hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-hover text-text-main font-bold py-3.5 px-6 rounded-lg shadow-sm hover:shadow-md transition-all duration-200 mt-2 uppercase tracking-wide text-sm" type="button">
                    Create Account
                </button>
</form>
<!-- Footer Link -->
<div class="text-center mt-2">
<p class="text-sm text-text-muted dark:text-[#d4c59a]">
                    Already have an account? 
                    <a class="text-text-main dark:text-white font-semibold hover:text-primary transition-colors" href="#">Log In</a>
</p>
</div>
</div>
</div>
</body></html>
