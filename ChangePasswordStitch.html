<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Change Password - Luxury River Tours</title>
<!-- Material Symbols Link -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f4c025",
              "primary-hover": "#dcb022",
              "background-light": "#f8f8f5",
              "background-dark": "#221e10",
              "surface-light": "#ffffff",
              "surface-dark": "#2c281b",
              "text-main-light": "#1c180d",
              "text-main-dark": "#f0ede6",
              "text-muted-light": "#6b5d38",
              "text-muted-dark": "#a39985",
              "border-light": "#e8e2ce",
              "border-dark": "#4a4430",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay -->
<div aria-hidden="true" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Modal Content -->
<div class="relative w-full max-w-lg bg-surface-light dark:bg-surface-dark rounded-xl shadow-2xl z-50 flex flex-col overflow-hidden border border-border-light dark:border-border-dark">
<!-- Header -->
<div class="flex items-center justify-between px-8 py-6 border-b border-border-light dark:border-border-dark bg-background-light/50 dark:bg-background-dark/50">
<div>
<h3 class="text-text-main-light dark:text-text-main-dark text-xl font-bold tracking-tight">Change Password</h3>
<p class="text-text-muted-light dark:text-text-muted-dark text-sm mt-1">Update your credentials to secure your account.</p>
</div>
<button class="text-text-muted-light dark:text-text-muted-dark hover:text-primary dark:hover:text-primary transition-colors p-2 rounded-full hover:bg-background-light dark:hover:bg-background-dark">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Form Body -->
<div class="p-8 space-y-6">
<!-- Current Password -->
<div class="space-y-2">
<label class="block text-sm font-medium text-text-main-light dark:text-text-main-dark" for="current-password">
                    Current Password
                </label>
<div class="relative group">
<input class="w-full bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark text-text-main-light dark:text-text-main-dark rounded-lg px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-text-muted-light/60 dark:placeholder:text-text-muted-dark/60" id="current-password" placeholder="Enter your current password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- New Password Section -->
<div class="space-y-4">
<div class="space-y-2">
<label class="block text-sm font-medium text-text-main-light dark:text-text-main-dark" for="new-password">
                        New Password
                    </label>
<div class="relative group">
<input class="w-full bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark text-text-main-light dark:text-text-main-dark rounded-lg px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-text-muted-light/60 dark:placeholder:text-text-muted-dark/60" id="new-password" placeholder="Create a new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Password Strength Meter -->
<div class="bg-background-light dark:bg-background-dark p-3 rounded-lg border border-border-light dark:border-border-dark">
<div class="flex justify-between items-center mb-2">
<span class="text-xs font-semibold text-text-muted-light dark:text-text-muted-dark uppercase tracking-wider">Password Strength</span>
<span class="text-xs font-medium text-primary">Fair</span>
</div>
<div class="flex gap-1 h-1.5">
<div class="flex-1 rounded-full bg-primary h-full"></div>
<div class="flex-1 rounded-full bg-primary h-full"></div>
<div class="flex-1 rounded-full bg-border-light dark:bg-border-dark h-full"></div>
<div class="flex-1 rounded-full bg-border-light dark:bg-border-dark h-full"></div>
</div>
<ul class="mt-3 space-y-1">
<li class="flex items-center text-xs text-text-muted-light dark:text-text-muted-dark">
<span class="material-symbols-outlined text-sm mr-2 text-green-600 dark:text-green-500">check_circle</span>
                            At least 8 characters
                        </li>
<li class="flex items-center text-xs text-text-muted-light dark:text-text-muted-dark">
<span class="material-symbols-outlined text-sm mr-2 text-green-600 dark:text-green-500">check_circle</span>
                            Contains a number
                        </li>
<li class="flex items-center text-xs text-text-muted-light dark:text-text-muted-dark opacity-60">
<span class="material-symbols-outlined text-sm mr-2">circle</span>
                            Contains a special character
                        </li>
</ul>
</div>
<!-- Confirm Password -->
<div class="space-y-2 pt-2">
<label class="block text-sm font-medium text-text-main-light dark:text-text-main-dark" for="confirm-password">
                        Confirm New Password
                    </label>
<div class="relative group">
<input class="w-full bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark text-text-main-light dark:text-text-main-dark rounded-lg px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-text-muted-light/60 dark:placeholder:text-text-muted-dark/60" id="confirm-password" placeholder="Re-enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="px-8 py-6 bg-background-light/30 dark:bg-background-dark/30 border-t border-border-light dark:border-border-dark flex flex-col sm:flex-row gap-3 justify-end">
<button class="w-full sm:w-auto px-6 py-3 rounded-lg text-sm font-medium text-text-main-light dark:text-text-main-dark border border-border-light dark:border-border-dark bg-white dark:bg-surface-dark hover:bg-background-light dark:hover:bg-background-dark transition-colors focus:outline-none focus:ring-2 focus:ring-primary/20">
                Cancel
            </button>
<button class="w-full sm:w-auto px-6 py-3 rounded-lg text-sm font-bold text-background-dark bg-primary hover:bg-primary-hover shadow-lg shadow-primary/20 hover:shadow-primary/40 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-surface-dark flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">lock_reset</span>
                UPDATE PASSWORD
            </button>
</div>
</div>
</body></html>
