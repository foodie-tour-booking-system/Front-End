<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>River Luxe Tours - Reset Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                        "neutral-surface": "#fcfbf8",
                        "neutral-border": "#e8e2ce",
                        "neutral-text": "#1c180d",
                        "neutral-subtle": "#9c8749",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar to match luxury feel if needed, otherwise optional */
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display antialiased text-neutral-text dark:text-slate-100">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-neutral-border bg-neutral-surface px-10 py-4 relative z-20">
<div class="flex items-center gap-4 text-neutral-text">
<div class="size-8 text-primary">
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_535)">
<path clip-rule="evenodd" d="M47.2426 24L24 47.2426L0.757355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z" fill="currentColor" fill-rule="evenodd"></path>
</g>
<defs>
<clippath id="clip0_6_535"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
<h2 class="text-neutral-text text-xl font-bold leading-tight tracking-[-0.015em]">River Luxe Tours</h2>
</div>
<div class="flex flex-1 justify-end gap-8 hidden md:flex">
<div class="flex items-center gap-9">
<a class="text-neutral-text text-sm font-medium hover:text-primary transition-colors" href="#">Tours</a>
<a class="text-neutral-text text-sm font-medium hover:text-primary transition-colors" href="#">Destinations</a>
<a class="text-neutral-text text-sm font-medium hover:text-primary transition-colors" href="#">About Us</a>
<a class="text-neutral-text text-sm font-medium hover:text-primary transition-colors" href="#">Contact</a>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-6 bg-primary text-neutral-text text-sm font-bold leading-normal tracking-[0.015em] hover:brightness-105 transition-all">
<span class="truncate">Login</span>
</button>
</div>
<button class="md:hidden text-neutral-text">
<span class="material-symbols-outlined">menu</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 relative flex items-center justify-center p-4">
<!-- Background Image with Overlay -->
<div class="absolute inset-0 z-0 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCjK4TktbZJm8x16N5hLywWrXzMz9jmqlQ6hK-R9WCNVwKKqlJd0O1JoJUXvI4hhoT7y1JaFMY_iUGPo7INo91jwXbBkRhRDZcziYhCGuLlqCPgstL6Jy_HADTiG61isHzqRrETcWsmeIBLWLYakrU6FXZq-rByEYpkQSseu3MjPpqYO2Gy75ra7NPJ_cPKVaFKpfLn5NEnG2xp_ul_2DvqteL3DJZ85oE9ENo6p9eXeyZT-53P2YstK9tY8D6h7PbwYRYVNKm0dqAO'); filter: blur(4px);">
</div>
<div class="absolute inset-0 z-0 bg-background-dark/30 backdrop-blur-[2px]" data-alt="Blurred river landscape background"></div>
<!-- Card Container -->
<div class="relative z-10 w-full max-w-md bg-neutral-surface/95 backdrop-blur-md rounded-xl shadow-2xl border border-neutral-border overflow-hidden">
<!-- Card Header -->
<div class="px-8 pt-10 pb-6 text-center border-b border-neutral-border/50">
<h1 class="text-neutral-text text-3xl font-black leading-tight tracking-tight mb-3">
                    Reset Password
                </h1>
<p class="text-neutral-subtle text-sm font-normal">
                    Create a strong password for your next journey.
                </p>
</div>
<!-- Form -->
<div class="px-8 py-8 space-y-6">
<!-- New Password Field -->
<div class="space-y-2">
<label class="text-neutral-text text-sm font-semibold ml-1" for="new-password">New Password</label>
<div class="relative flex items-center group focus-within:ring-2 focus-within:ring-primary/50 rounded-lg transition-all">
<div class="absolute left-3 text-neutral-subtle flex items-center pointer-events-none">
<span class="material-symbols-outlined" style="font-size: 20px;">lock</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-3 bg-white border border-neutral-border rounded-lg text-neutral-text placeholder:text-neutral-subtle/70 focus:border-primary focus:ring-0 text-sm transition-colors" id="new-password" placeholder="Enter new password" type="password"/>
</div>
</div>
<!-- Password Strength -->
<div class="space-y-2">
<div class="flex justify-between items-center text-xs">
<span class="text-neutral-text font-medium">Password Strength</span>
<span class="text-neutral-subtle">Weak</span>
</div>
<div class="flex h-1.5 w-full bg-neutral-border rounded-full overflow-hidden gap-1">
<div class="h-full bg-primary flex-1 rounded-full"></div>
<div class="h-full bg-neutral-border flex-1 rounded-full"></div>
<div class="h-full bg-neutral-border flex-1 rounded-full"></div>
<div class="h-full bg-neutral-border flex-1 rounded-full"></div>
</div>
<p class="text-[10px] text-neutral-subtle ml-1">Must be at least 8 characters</p>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="text-neutral-text text-sm font-semibold ml-1" for="confirm-password">Confirm New Password</label>
<div class="relative flex items-center group focus-within:ring-2 focus-within:ring-primary/50 rounded-lg transition-all">
<div class="absolute left-3 text-neutral-subtle flex items-center pointer-events-none">
<span class="material-symbols-outlined" style="font-size: 20px;">check_circle</span>
</div>
<input class="form-input w-full pl-10 pr-4 py-3 bg-white border border-neutral-border rounded-lg text-neutral-text placeholder:text-neutral-subtle/70 focus:border-primary focus:ring-0 text-sm transition-colors" id="confirm-password" placeholder="Re-enter your new password" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-[#eac54d] active:bg-[#d6a520] text-neutral-text text-base font-bold py-3.5 rounded-lg shadow-md hover:shadow-lg transition-all transform active:scale-[0.99]">
<span class="truncate tracking-wide">SAVE NEW PASSWORD</span>
<span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
<!-- Footer Links -->
<div class="pt-2 text-center">
<a class="inline-flex items-center gap-1.5 text-neutral-subtle hover:text-neutral-text text-sm font-medium transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform" style="font-size: 16px;">arrow_back</span>
                        Back to Login
                    </a>
</div>
</div>
</div>
</main>
<!-- Simple Footer -->
<footer class="bg-neutral-surface border-t border-neutral-border py-6 relative z-20">
<div class="max-w-7xl mx-auto px-10 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-neutral-subtle">
<p>© 2024 River Luxe Tours. All rights reserved.</p>
<div class="flex gap-6">
<a class="hover:text-neutral-text transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-neutral-text transition-colors" href="#">Terms of Service</a>
</div>
</div>
</footer>
