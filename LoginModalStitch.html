<!DOCTYPE html>

<html lang="en"><head>

<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {

              "background-dark": "#221e10",

              "surface-dark": "#2c281a",
              "text-main": "#1c180d",

            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

        },

        ::-webkit-scrollbar-thumb {

<body class="bg-background-light dark:bg-background-dark font-display text-text-main dark:text-gray-100 min-h-screen flex flex-col relative overflow-hidden">

<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center opacity-40 dark:opacity-20" data-alt="Calm river with traditional boat at sunset" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC9wZEGJUJeVQdtny8L4-4Rjtgx6uodQUFMqXJUi83__WX0-C45Ug8d08sfd8Co8_2vNdFg4iNiZi65Pnl6w_yhG1DCElAoyDotnMbLhJ2ezfwMdQunxE4yVdGAJRx6gmO5chi4H-k_CGO-5OavUai9j8A2OQhJKexteIlCH0h7ADwcW7AMR1oXoY7wkTQ3slpr5niZL0L3M_ZT7qzulihdt6-59w0DrxzVe_r_oka57Het-XzGRIX5DEmvpEua12TGqFKA7Aw1lZFt');"></div>
<!-- Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-b from-background-light/20 to-background-light/80 dark:from-background-dark/40 dark:to-background-dark/90"></div>
</div>
<!-- Main Content Wrapper -->
<div class="relative z-10 flex-1 flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
<!-- Modal Container -->
<div class="w-full max-w-[480px] bg-white dark:bg-surface-dark shadow-2xl rounded-2xl overflow-hidden border border-primary/20">
<!-- Header Section with Logo -->
<div class="pt-8 px-8 pb-4 flex flex-col items-center text-center">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4 border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl">sailing</span>
</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight mb-2">Les Rives</h1>
<p class="text-text-muted dark:text-gray-400 text-sm">Luxury River Experience</p>
</div>
<!-- Login Form Section -->
<div class="px-8 pb-8 pt-2">
<h2 class="text-xl font-semibold text-slate-900 dark:text-white mb-6 text-center">Welcome Back</h2>
<form class="space-y-5">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-gray-300" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 group-focus-within:text-primary text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-gray-200 dark:border-gray-700 rounded-lg leading-5 bg-background-light dark:bg-black/20 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary sm:text-sm text-slate-900 dark:text-white transition-colors" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-slate-700 dark:text-gray-300" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary-dark transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 group-focus-within:text-primary text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-gray-200 dark:border-gray-700 rounded-lg leading-5 bg-background-light dark:bg-black/20 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary sm:text-sm text-slate-900 dark:text-white transition-colors" id="password" placeholder="Enter your password" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-[20px]">visibility</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all uppercase tracking-wide mt-2" type="button">
                        Log In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-6">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-surface-dark text-gray-500">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center px-4 py-2.5 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm bg-white dark:bg-surface-dark text-sm font-medium text-slate-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" type="button">
<img alt="Google logo" class="h-5 w-5 mr-2" data-alt="Google G logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDnlQIq-CxlIMcv_2mNgpJSD47KA7AJzjUGM6m8J28w_qLjqtMOGN-Df6Ld57t9__7iCMbOjPstj7Pqu-3gjT1Rduh-ueva8FpuDlw8TV7p2knsGl2QERfavkGkG7a5QQNjx7ivilwDcJLY4d-jTqjIS-_b-7V0XnBu3hCrpakxtWl3D3MHRZvYG60HXt0zxBWVosMqerIjA0igp2P9Y8baUBFRciv5taeyRL5cyGzcIg2AOD9fggXi497hkKnf2PegBDFZXV10DIAp"/>
                        Google
                    </button>
<button class="flex items-center justify-center px-4 py-2.5 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm bg-white dark:bg-surface-dark text-sm font-medium text-slate-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" type="button">
<img alt="Facebook logo" class="h-5 w-5 mr-2" data-alt="Facebook F logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRE6obi6wk5TcqfR5WiIFUrVgWGpV87oJIoXo6anu19V5DHJaPAXKNoESTOrktvrb1hBuEPdhO89w6yKjj2Qp2hpV8YMTtlZRB_hNyx4jO0Wf_1Q0zmc3Q9dBcoz0mM0-BfYVJfx8h7PfwhlbJkCvom7oe2KSnOK36m6-q2fJy5IqCKTBXOjbMFRxKxy_-9amy-Rcqoy9fe-gsx7etzfWPF9RmkBglvaBVgITzEL8qtnU0axurKwgKdGdXs_CzPbEoevhuVqIEmCJp"/>

                    </button>

<div class="mt-6 text-center">
<p class="text-sm text-gray-500 dark:text-gray-400">
                        Don't have an account? 
                        <a class="font-semibold text-primary hover:text-primary-dark transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Bottom decorative bar -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary/40 via-primary to-primary/40"></div>
</div>
<!-- Footer text (outside modal) -->
<div class="mt-8 text-center text-xs text-gray-500 dark:text-gray-400 z-10">
<p>© 2023 Les Rives. All rights reserved.</p>
<div class="flex gap-4 justify-center mt-2">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</div>
</div>
